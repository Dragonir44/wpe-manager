name: release

on:
  push:
    tags:
      - "v*"

jobs:
  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # requis pour le trusted publishing (OIDC)
    outputs:
      version: ${{ steps.check.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches __version__
        id: check
        run: |
          pkg=$(python -c "import wpe_manager; print(wpe_manager.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          echo "package=$pkg  tag=$tag"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::Tag ($tag) != wpe_manager.__version__ ($pkg)"
            exit 1
          fi
          echo "version=$pkg" >> "$GITHUB_OUTPUT"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Compute sdist sha256
        id: hash
        run: |
          f=$(ls dist/*.tar.gz)
          echo "sha256=$(sha256sum "$f" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  aur:
    name: Publish to AUR
    needs: pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync PKGBUILD (pkgver + sha256 du sdist publié)
        env:
          VERSION: ${{ needs.pypi.outputs.version }}
          SHA256: ${{ needs.pypi.outputs.sha256 }}
        run: |
          f=packaging/aur/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" "$f"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$f"
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA256')/" "$f"

      - name: Deploy to AUR
        # Vérifie la dernière version sur https://github.com/KSXGitHub/github-actions-deploy-aur/releases
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: wpe-manager
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: Dragonir
          commit_email: dragonir44@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "upgpkg: wpe-manager ${{ needs.pypi.outputs.version }}"
